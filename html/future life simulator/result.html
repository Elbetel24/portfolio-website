<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Roadmap</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <h1>User Profile & Goals</h1>

    <div class="result-container">
        <div class="card">
            <h2>Personal Info</h2>
            <p><strong>Name:</strong> <span id="displayName"></span></p>
            <p><strong>Age:</strong> <span id="displayAge"></span></p>
            <p><strong>Motivation:</strong> <span id="displayMotivation"></span></p>
        </div>

        <div class="card">
            <h2>Career & Growth</h2>
            <p><strong>Current Career:</strong> <span id="displayCareer"></span></p>
            <p><strong>Primary Goal:</strong> <span id="displayCareerGoal"></span></p>
            <p><strong>Secondary Goal:</strong> <span id="displayCareerGoal2"></span></p>
            <p><strong>Current Study:</strong> <span id="displayStudy"></span></p>
            <p><strong>Skills to Build:</strong> <span id="displaySkills"></span></p>
        </div>

        <div class="card">
            <h2>Lifestyle & Finance</h2>
            <p><strong>Current Savings:</strong> $<span id="displaySaving"></span></p>
            <p><strong>Financial Goal:</strong> <span id="displayFinancialGoal"></span></p>
            <p><strong>Exercise Routine:</strong> <span id="displayExercise"></span></p>
        </div>
    </div>

    <button onclick="window.location.href='index.html'">Edit Profile</button>

    <script src="result.js"></script>
</body>
</html>
