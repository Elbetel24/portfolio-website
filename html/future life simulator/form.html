<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Life Simulator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div>
    <h1>Let's find out more about you!</h1>
    <form id="userForm"></form>
    <h2>Personal</h2>
    <label>Name:</label><br>
        <input type="text" id="name" required><br><br>
    <label>Age:</label><br>
        <input type="number" id="age" required><br><br>
    <label>Current Status(Student,Employee):</label><br>
        <input type="text" id="career" required><br>
    <h2>Career and learning</h2>
    <label>What career are you aiming for?</label><br>
    <input type="text" id="careerGoal" required><br><br>
    <label>How many hours do you study or practice skills per day?</label><br>    <input type="text" id="name" required><br><br>
       <input type="number" id="study" required><br><br>
       <label>Which skills are you currently learning?</label><br>
       <input type="text" id="skills" required><br>
       <h2>Financial habits</h2>
    <label>How much money do you save per month?</label><br>
    <input type="number" id="saving" required><br><br>
    <label>Do you have a financial goal?</label><br>
    <input type="number" id="financialGoal" required><br><br>
    <h2>Health & Lifestyle</h2>
    <label>How many hours do you exercise per week?</label><br>
       <input type="number" id="exercise" required><br><br>
    <label>How many hours do you sleep at night?</label><br>
    <h2>Future Mindset</h2>
    <label>What is your biggest goal for the next 5 years?</label><br>
        <input type="text" id="careerGoal2" required><br><br>
         <label>How motivated do you feel right now?(1-5)</label><br>
           <input type="number" id="motivation" required><br><br>
            <a href="result.html">
              <button>Submit</button>
</a>

            
</form>
<script src="js/form.js"></script>
</body>
</html>
