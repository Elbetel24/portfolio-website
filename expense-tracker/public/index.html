<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Expense Tracker</h1>

    <section id="auth">
      <div id="signup">
        <h3>Sign up</h3>
        <input id="su-name" placeholder="Name">
        <input id="su-email" placeholder="Email">
        <input id="su-pass" placeholder="Password" type="password">
        <button id="btn-signup">Sign Up</button>
        <p class="auth-toggle">Already have an account? <a href="#" id="show-login">Log in</a></p>
      </div>
      <div id="login" style="display:none">
        <h3>Login</h3>
        <input id="li-email" placeholder="Email">
        <input id="li-pass" placeholder="Password" type="password">
        <button id="btn-login">Login</button>
        <p class="auth-toggle">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
      </div>
    </section>

    <section id="app" style="display:none">
      <div class="top">
        <div>
          <button id="btn-logout">Logout</button>
        </div>
      </div>

      <form id="expense-form">
        <input id="title" placeholder="Title" required>
        <input id="amount" placeholder="Amount" type="number" step="0.01" required>
        <select id="category"><option>Food</option><option>Transport</option><option>Rent</option><option>Utilities</option><option>General</option></select>
        <input id="date" type="date">
        <button>Add</button>
      </form>

      <div class="filters">
        <input id="search" placeholder="Search">
        <select id="filter-category"><option value="">All</option><option>Food</option><option>Transport</option><option>Rent</option><option>Utilities</option><option>General</option></select>
        <button id="btn-refresh">Refresh</button>
      </div>

      <canvas id="summaryChart" height="150"></canvas>

      <ul id="expenses"></ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
